services:

  nginx:
    image: nginx:latest
    container_name: gamehosting-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro

    restart: unless-stopped

    depends_on:
      - api

  mariadb:
    image: mariadb:11
    container_name: gamehosting-db

    environment:
      MARIADB_ROOT_PASSWORD: rootpass123
      MARIADB_DATABASE: gamehosting
      MARIADB_USER: gameuser
      MARIADB_PASSWORD: gamepass123

    volumes:
      - mariadb_data:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: gamehosting-api


    depends_on:
      - mariadb

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus
    container_name: gamehosting-prometheus

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: gamehosting-grafana

    restart: unless-stopped

    volumes:
      - grafana_data:/var/lib/grafana

    environment:
      GF_SERVER_DOMAIN: grafana.local
      GF_SERVER_ROOT_URL: http://grafana.local
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gamehosting-cadvisor

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki

    command: -config.file=/etc/loki/local-config.yaml

    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  db_data:
  grafana_data:
  prometheus_data:
  mariadb_data:
  loki_data:
