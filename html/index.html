<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeldrikLabs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      max-width: 850px;
      padding: 48px;
    }
    h1 {
      font-size: 58px;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .subtitle {
      font-size: 24px;
      color: #93c5fd;
      margin-bottom: 24px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #cbd5e1;
    }
    .services {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .badge {
      border: 1px solid #334155;
      padding: 10px 16px;
      border-radius: 999px;
      background: #111827;
      color: #e5e7eb;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }
    .links {
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>VeldrikLabs</h1>
    <div class="subtitle">Infrastructure, Automation & Observability</div>

    <p>
      We build and manage reliable Linux, Docker, monitoring and automation platforms
      for small businesses, game servers and technical projects.
    </p>

    <div class="services">
      <div class="badge">Linux VPS</div>
      <div class="badge">Docker</div>
      <div class="badge">Nginx</div>
      <div class="badge">Grafana</div>
      <div class="badge">Monitoring</div>
      <div class="badge">Automation</div>
    </div>

    <div class="links">
      <a href="https://grafana.veldriklabs.com">Grafana Dashboard</a>
    </div>
  </main>
</body>
</html>
