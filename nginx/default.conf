server {
    listen 80;
    server_name veldriklabs.com www.veldriklabs.com api.veldriklabs.com grafana.veldriklabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name veldriklabs.com www.veldriklabs.com;

    ssl_certificate /etc/letsencrypt/live/veldriklabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veldriklabs.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name api.veldriklabs.com;

    ssl_certificate /etc/letsencrypt/live/veldriklabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veldriklabs.com/privkey.pem;

    location / {
        proxy_pass http://api:5000;
    }
}

server {
    listen 443 ssl;
    server_name grafana.veldriklabs.com;

    ssl_certificate /etc/letsencrypt/live/veldriklabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veldriklabs.com/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
