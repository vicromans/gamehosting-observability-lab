server {
    listen 80;
    server_name api.local;

    location / {
        proxy_pass http://api:5000;
    }
}

server {
    listen 80;
    server_name grafana.local;

    location / {
        proxy_pass http://grafana:3000;
    }
}

server {
    listen 80;
    server_name prometheus.local;

    location / {
        proxy_pass http://prometheus:9090;
    }
}
