<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{{ business.business_name }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/whatsapp/static/css/theme.css">

    {% block styles %}
    {% endblock %}
</head>

<body>
    <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button">
        ☰ {{ business.business_name }}
    </button>

    <div class="layout">

        {% include "components/sidebar.html" %}

        <main class="main">
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <script src="/whatsapp/static/js/mobile-menu.js"></script>

    {% block scripts %}
    {% endblock %}
</body>
</html>
