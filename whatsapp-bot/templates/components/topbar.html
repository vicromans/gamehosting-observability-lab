<div class="topbar">
    <div>
        <h1>{{ page_title }}</h1>

        {% if page_subtitle %}
        <p class="page-subtitle">{{ page_subtitle }}</p>
        {% endif %}
    </div>

    <div class="topbar-actions">
        {% block topbar_actions %}
        {% endblock %}

        <div class="business-pill">
            {{ business.business_name }} · {{ business.business_type }}
        </div>
    </div>
</div>
